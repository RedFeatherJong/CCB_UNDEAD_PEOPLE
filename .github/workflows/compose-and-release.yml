name: Compose and Release

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compose:
    name: Compose CCB_UNDEAD_PEOPLE tileset
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tileset source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: python3 python3-pip libvips42
      - run: pip install pyvips

      - name: Compose tileset
        run: |
          export SOURCE="${{ github.workspace }}"
          export DEST="${{ github.workspace }}/gfx/UNDEAD_PEOPLE"
          mkdir -p "$DEST"
          # --use-all 与官方 ChibiUltica compose 参数保持一致(本贴图源自 Chibi_Ultica)
          python3 tools/gfx_tools/compose.py --use-all --feedback CONCISE --format-json --loglevel INFO "$SOURCE" "$DEST"
          # 复制游戏运行所需的元文件
          cp -v "$SOURCE/tileset.txt" "$DEST/"
          [ -f "$SOURCE/fallback.png"  ] && cp -v "$SOURCE/fallback.png"  "$DEST/" || echo "no fallback.png"
          [ -f "$SOURCE/layering.json" ] && cp -v "$SOURCE/layering.json" "$DEST/" || echo "no layering.json"
          echo "=== composed output ==="
          ls -la "$DEST"

      - name: Package tileset ZIP
        run: |
          cd "${{ github.workspace }}/gfx"
          zip -r -q "${{ github.workspace }}/CCB_UNDEAD_PEOPLE.zip" UNDEAD_PEOPLE
          echo "=== zip contents ==="
          unzip -l "${{ github.workspace }}/CCB_UNDEAD_PEOPLE.zip" | head -20

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CCB_UNDEAD_PEOPLE
          path: gfx/UNDEAD_PEOPLE/*

      - name: Compute release tag
        id: tag
        run: echo "tag=undead-$(date +%Y%m%d)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Publish release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: CCB_UNDEAD_PEOPLE ${{ steps.tag.outputs.tag }}
          files: CCB_UNDEAD_PEOPLE.zip
          generate_release_notes: true
